[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings

markers =
    admin: Admin portal tests
    auth: Authentication tests
    api: API endpoint tests
    unit: Unit tests
    integration: Integration tests (requires DB)
