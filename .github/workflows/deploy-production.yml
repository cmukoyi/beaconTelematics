name: Deploy Beacon Telematics to Production

on:
  push:
    branches:
      - main

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Test Backend Code
        run: |
          cd gps-tracker/backend
          pip install -r requirements.txt -r requirements-dev.txt
          pytest tests/ -v

  build-flutter:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.2'
          channel: 'stable'
          cache: true
      - name: Build Flutter Web
        run: |
          cd gps-tracker/mobile-app/ble_tracker_app
          flutter pub get
          flutter build web --release --no-tree-shake-icons
      - uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: gps-tracker/mobile-app/ble_tracker_app/build/web/
          retention-days: 1

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-flutter
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: gps-tracker/mobile-app/ble_tracker_app/build/web/
      - uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
      - name: Deploy to Production Server
        env:
          SSH_HOST: ${{ secrets.DO_SERVER_IP }}
          SSH_USER: ${{ secrets.DO_USER }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          MZONE_CLIENT_ID: ${{ secrets.MZONE_CLIENT_ID }}
          MZONE_CLIENT_SECRET: ${{ secrets.MZONE_CLIENT_SECRET }}
          MZONE_USERNAME: ${{ secrets.MZONE_USERNAME }}
          MZONE_PASSWORD: ${{ secrets.MZONE_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        run: |
          chmod +x deploy/deploy.sh
          ./deploy/deploy.sh
